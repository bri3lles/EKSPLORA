<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/daftar.css">
</head>
<body>

    <div class="auth-container">
        <!-- kolom kiri -->
        <div class="auth-left" style="background-image: url('../assets/background.jpeg'); background-size: cover; background-position: center;">
            <div class="left-content">
                <h1>Daftarkan Akunmu dan Bergabung Bersama Kami</h1>
                <p>Telusuri ragam budaya Jawa Timur, jadilah bagian dari upaya melestarikan seni, tradisi, dan kearifan lokal yang patut dibanggakan.</p>
            </div>
        </div>

        <!-- kolo kanan -->
        <div class="auth-right">
            <a href="#" class="back-link">kembali ke beranda</a>
            
            <div class="form-card">
                <h2>Daftar</h2>

                <form action="#" method="POST">
                    <!-- Nama Akun -->
                    <div class="form-group">
                        <label for="username">Nama Akun</label>
                        <input type="text" id="username" name="username" placeholder="Masukkan nama akun" required>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Masukkan email" required>
                    </div>

                    <!-- sandi -->
                    <div class="form-group">
                        <label for="password">Sandi</label>
                        <input type="password" id="password" name="password" placeholder="Masukkan sandi" required>
                    </div>

                    <!-- Tombol Daftar -->
                    <button type="submit" class="btn-primary"><a href="dashboard_user.html">Daftar</a></button>
                </form>

                <!-- Separator -->
                <div class="separator">atau daftar dengan</div>
                
                <!-- Ikon Sosial Media -->
                <div class="social-icons">
                    <a href="#" class="social-icon" title="Masuk dengan Google"><i class="fa-brands fa-google"></i></a>
                    <a href="#" class="social-icon" title="Masuk dengan Apple"><i class="fa-brands fa-apple"></i></a>
                    <a href="#" class="social-icon" title="Masuk dengan Twitter"><i class="fa-brands fa-twitter"></i></a>
                </div>

                <div class="switch-link">
                    Sudah punya akun? <a href="masuk.html">Masuk</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
